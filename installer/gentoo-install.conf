# =============================================================================
# gentoo-install.conf
# Gentoo Installation Configuration  —  2025/2026
#
# Usage:
#   1. Edit this file to match your system
#   2. Run: bash gentoo-install.sh --config gentoo-install.conf
#
# All lines starting with # are comments and are ignored.
# Passwords are NOT stored here — the install script prompts securely.
# =============================================================================


# =============================================================================
# DISK & PARTITIONING
# =============================================================================
# Run `lsblk` to find your disk name.
# Common values:
#   /dev/nvme0n1   — NVMe SSD (most modern laptops/desktops)
#   /dev/sda       — SATA SSD or HDD
#   /dev/vda       — Virtual machine disk

DISK="/dev/nvme0n1"

# Partition sizes in GiB
EFI_SIZE="1"        # 512M is minimum; 1G gives room for multiple kernels
SWAP_SIZE="8"       # Set to 0 to skip swap entirely
                    # Rule of thumb: match RAM if you hibernate, else half RAM

# Root filesystem
# Options: btrfs | ext4 | xfs | f2fs
#
#   btrfs  — Copy-on-Write, built-in snapshots, zstd compression.
#            Best all-around choice for desktops in 2025.
#   ext4   — Rock-solid, simple, no frills. Good for servers.
#   xfs    — Excellent for large files and high throughput.
#   f2fs   — Flash-Friendly FS. Optimised for NVMe/eMMC.

FS_TYPE="btrfs"

# LUKS2 full-disk encryption
# Encrypts the root partition with AES-256-XTS + Argon2id key derivation.
# You will be prompted for a passphrase at install time and on every boot.
# Options: yes | no

ENABLE_LUKS="no"

# Btrfs automatic snapshots via snapper
# Only used when FS_TYPE="btrfs"
# Creates timeline snapshots and cleans up old ones automatically.
# Options: yes | no

ENABLE_BTRFS_SNAPPER="no"


# =============================================================================
# IDENTITY & LOCALISATION
# =============================================================================

HOSTNAME="gentoo"
USERNAME="user"
# Passwords are prompted interactively — never stored in this file.

# Timezone — must match a path under /usr/share/zoneinfo/
# Examples: America/New_York | Europe/London | Asia/Tokyo | UTC
TIMEZONE="America/New_York"

# Locale — used for language, date/number formatting
# Examples: en_US.UTF-8 | en_GB.UTF-8 | de_DE.UTF-8 | ja_JP.UTF-8
LOCALE="en_US.UTF-8"

# Console keymap — see `localectl list-keymaps` for full list
# Examples: us | uk | de | fr | dvorak | colemak
KEYMAP="us"


# =============================================================================
# INIT SYSTEM
# =============================================================================
# Options: openrc | systemd
#
#   openrc   — Traditional, lightweight, fast boot. Gentoo's native init.
#   systemd  — Feature-rich, broader software compatibility (e.g. GNOME/KDE
#              work better with systemd; also required for some Flatpak features)

INIT_SYSTEM="openrc"


# =============================================================================
# PORTAGE KEYWORD BRANCH
# =============================================================================
# Options: amd64 | ~amd64
#
#   amd64   — Stable. Packages are well-tested. Recommended for servers
#             and anyone who wants a boring, reliable system.
#   ~amd64  — Testing. Newer package versions. Required for some bleeding-edge
#             compositors (Niri, Hyprland, COSMIC) and recent GPU drivers.
#             Most Gentoo desktop users run ~amd64.

ACCEPT_KEYWORDS="~amd64"


# =============================================================================
# HARDWARE
# =============================================================================

# CPU vendor — used to install the correct microcode
# Options: intel | amd | generic
CPU_VENDOR="amd"

# GPU vendor — determines Mesa, Vulkan, and driver packages
# Options: amd | intel | nvidia | generic
#
#   amd     — AMDGPU open driver (Mesa + RADV Vulkan). Best open-source GPU support.
#   intel   — i915/iris open driver (Mesa + ANV Vulkan).
#   nvidia  — Proprietary nvidia-drivers. Required for CUDA. Wayland support
#             has improved greatly in 2024-2025 but still has quirks.
#   generic — Software/VESA rendering. For VMs or unknown hardware.
GPU_VENDOR="amd"

# VIDEO_CARDS — Portage make.conf value, auto-derived from GPU_VENDOR above.
# Only override this if you have a hybrid/multi-GPU system.
# Examples:
#   "amdgpu radeonsi"      — AMD discrete GPU
#   "intel i965 iris"      — Intel integrated GPU
#   "nvidia"               — NVIDIA proprietary
#   "intel amdgpu radeonsi" — Intel iGPU + AMD dGPU (hybrid)
VIDEO_CARDS="amdgpu radeonsi"

# Parallel build flags — -jN where N = number of CPU threads
# Recommended: -j$(nproc) for full parallelism
# If your machine runs out of RAM during builds, reduce N.
MAKEOPTS="-j8 -l8"


# =============================================================================
# KERNEL
# =============================================================================
# KERNEL_TYPE options: dist | sources | hardened | rt
#
#   dist      — gentoo-kernel-bin: pre-compiled binary kernel. Fastest install,
#               no compilation required. Good default for most users.
#   sources   — gentoo-sources: full kernel source. You configure and compile.
#               Required if you need very specific driver or hardware support.
#   hardened  — hardened-sources: extra security patches (PaX, grsecurity-style).
#               For security-focused systems.
#   rt        — rt-sources: real-time kernel. For audio production / low-latency.

KERNEL_TYPE="dist"

# KERNEL_CONFIG — only used when KERNEL_TYPE is sources | hardened | rt
# Options: defconfig | genkernel | manual
#
#   defconfig  — `make defconfig` then compile. Sensible defaults. Recommended.
#   genkernel  — Automated build with initramfs. Easier, slightly larger kernel.
#   manual     — Opens menuconfig so you configure everything yourself.

KERNEL_CONFIG="defconfig"


# =============================================================================
# DISPLAY SERVER
# =============================================================================
# Options: wayland | x11 | both
#
#   wayland  — Modern display protocol. Better security, smoother rendering,
#              native HiDPI. Recommended for all new installs in 2025.
#   x11      — Legacy X11/Xorg. Maximum compatibility with older software.
#   both     — Wayland as primary, XWayland for X11 app compatibility.
#              Most Wayland compositors already pull in XWayland anyway.

DISPLAY_SERVER="wayland"


# =============================================================================
# DESKTOP ENVIRONMENT / WINDOW MANAGER
# =============================================================================
# Options (Wayland): none | gnome | kde | cosmic | sway | niri | hyprland |
#                    river | labwc | custom
# Options (X11):     none | gnome | kde | xfce | lxqt | openbox | i3 | dwm |
#                    custom
#
# Brief descriptions:
#
#   none      — No DE/WM installed. Pure CLI system. Configure display yourself.
#   custom    — Install script skips DE installation. Add packages to
#               EXTRA_PACKAGES below and configure session manually.
#
#   --- Full Desktop Environments ---
#   gnome     — GNOME Shell. Modern, polished, touch-friendly. Heavy.
#               Strongly prefers systemd. Works with OpenRC but with more effort.
#   kde       — KDE Plasma 6. Feature-rich, highly customisable, Qt-based.
#               Excellent Wayland support as of Plasma 6 (2024).
#   cosmic    — COSMIC Desktop by System76. New Rust-based DE (2025).
#               Wayland-native, tiling+floating hybrid. Still maturing.
#   xfce      — XFCE 4. Lightweight GTK DE. Mature and stable. X11 primary.
#   lxqt      — LXQt. Lightweight Qt DE. Good Wayland support via kwin_wayland.
#
#   --- Tiling Wayland Compositors ---
#   sway      — i3-compatible tiling WM. Mature, widely used.
#   niri      — Scrollable-columns tiling compositor. Unique spatial model.
#               Written in Rust. Very active development.
#   hyprland  — Highly customisable animated tiling compositor. Very popular
#               in 2024-2025. Eye-candy focused, riced setups.
#   river     — Tag-based WM inspired by dwm. Minimal, scriptable.
#   labwc     — Openbox-like stacking WM for Wayland. Traditional feel.
#
#   --- X11 Window Managers ---
#   openbox   — Lightweight stacking WM. Pairs well with tint2/polybar.
#   i3        — Classic tiling WM. Huge community, well-documented.
#   dwm       — Dynamic WM from suckless. Minimal, patched from source.

DESKTOP_ENV="niri"


# =============================================================================
# PORTAGE USE FLAGS
# =============================================================================
# These are derived automatically from your choices above.
# Edit only if you know what you're doing.
# Full USE flag reference: https://wiki.gentoo.org/wiki/USE_flag
#
# Common additions:
#   lto          — Link-Time Optimisation (faster binaries, longer compile)
#   hardened     — Enable hardening flags across packages
#   zstd         — Zstandard compression support
#   jpeg webp    — Image format support
#   ffmpeg       — Multimedia decoding (needed by browsers, video players)
#   x264 x265    — Video codec support
#   opengl       — Legacy OpenGL (most things want this)
#   vulkan        — Vulkan GPU API support
#   networkmanager — NetworkManager integration in apps

USE_FLAGS="wayland X -gnome -kde -plasma -systemd udev dbus policykit pipewire pulseaudio"


# =============================================================================
# OPTIONAL FEATURES
# =============================================================================

# PipeWire — modern audio/video server replacing PulseAudio and JACK.
# Strongly recommended for any desktop system in 2025.
# Options: yes | no
ENABLE_PIPEWIRE="yes"

# Bluetooth support via BlueZ + Blueman GUI
# Options: yes | no
ENABLE_BLUETOOTH="no"

# CUPS printing + Avahi network printer discovery
# Options: yes | no
ENABLE_PRINTING="no"

# Flatpak — sandboxed app distribution. Adds Flathub remote automatically.
# Options: yes | no
ENABLE_FLATPAK="no"

# Libvirt + QEMU — hardware virtualisation (KVM).
# Installs virt-manager GUI. Adds user to libvirt group.
# Options: yes | no
ENABLE_LIBVIRT="no"

# Docker + Podman — container runtime.
# Adds user to docker group.
# Options: yes | no
ENABLE_DOCKER="no"

# Secure Boot via sbctl
# Signs GRUB and kernel after install. You must enable Secure Boot in your
# firmware and enroll the generated keys.
# Requires: UEFI system, firmware in Setup Mode before running sbctl.
# Options: yes | no
ENABLE_SECURE_BOOT="no"


# =============================================================================
# EXTRA PACKAGES
# =============================================================================
# Space-separated list of additional Portage atoms to emerge after the main
# install. These are installed inside the chroot before first boot.
#
# Examples:
#   app-editors/vim
#   www-client/firefox
#   net-irc/hexchat
#   media-video/mpv
#   app-office/libreoffice
#   dev-lang/python
#   games-util/gamemode
#   app-emulation/wine

EXTRA_PACKAGES=""


# =============================================================================
# PORTAGE MIRRORS
# =============================================================================
# Space-separated list of mirror URLs. The Gentoo global CDN works well
# everywhere, but a regional mirror can significantly speed up downloads.
#
# Find mirrors at: https://www.gentoo.org/downloads/mirrors/
#
# Examples:
#   https://distfiles.gentoo.org               Global CDN (default)
#   https://mirrors.kernel.org/gentoo          US — kernel.org
#   https://mirror.leaseweb.com/gentoo         EU — Leaseweb
#   https://mirror.bytemark.co.uk/gentoo       UK — Bytemark
#   https://ftp.iij.ad.jp/pub/linux/gentoo     JP — IIJ
#   https://mirrors.tuna.tsinghua.edu.cn/gentoo CN — Tsinghua

GENTOO_MIRRORS="https://distfiles.gentoo.org"

# Stage3 variant — auto-derived from INIT_SYSTEM. Only override if you need
# a specialised stage3 (e.g. hardened or musl).
# Options: openrc | systemd | hardened | musl
STAGE3_VARIANT="openrc"