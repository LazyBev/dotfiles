# =============================================================================
# gentoo-install.conf
# Gentoo Installation Configuration  —  2025/2026
#
# Usage:
#   1. Edit this file to match your system
#   2. Run: bash gentoo-install.sh --config gentoo-install.conf
#
# All lines starting with # are comments and are ignored.
# Passwords are NOT stored here — the install script prompts securely.
# =============================================================================


# =============================================================================
# DISK & PARTITIONING
# =============================================================================

DISK="/dev/nvme0n1"

EFI_SIZE="1"        # 1G gives room for multiple kernels
SWAP_SIZE="8"       # 8G — sufficient for suspend-to-RAM on 16G RAM

# Root filesystem
# Options: btrfs | ext4 | xfs | f2fs
FS_TYPE="btrfs"

# LUKS2 full-disk encryption
# Options: yes | no
ENABLE_LUKS="no"

# Btrfs automatic snapshots via snapper (only when FS_TYPE="btrfs")
# Options: yes | no
ENABLE_BTRFS_SNAPPER="no"


# =============================================================================
# IDENTITY & LOCALISATION
# =============================================================================

HOSTNAME="gentuwu"
USERNAME="25yari"
# Passwords are prompted interactively — never stored in this file.

TIMEZONE="Europe/London"
LOCALE="en_US.UTF-8"
KEYMAP="us"


# =============================================================================
# INIT SYSTEM
# =============================================================================
# Options: openrc | systemd
INIT_SYSTEM="openrc"


# =============================================================================
# PORTAGE KEYWORD BRANCH
# =============================================================================
# ~amd64 required for niri and recent NVIDIA Wayland drivers
# Options: amd64 | ~amd64
ACCEPT_KEYWORDS="~amd64"


# =============================================================================
# HARDWARE
# =============================================================================

CPU_VENDOR="amd"
GPU_VENDOR="nvidia"

# AMD iGPU + NVIDIA dGPU desktop (no CUDA)
# nvidia-drivers handles the dGPU; amdgpu covers the iGPU/display engine
VIDEO_CARDS="amdgpu nvidia"

# 8 threads — adjust to match your Ryzen core/thread count (check: nproc)
MAKEOPTS="-j8 -l8"


# =============================================================================
# KERNEL
# =============================================================================
# Options: dist | sources | hardened | rt
#
# dist = gentoo-kernel-bin, pre-compiled, no compilation required.
# Switch to "sources" + "defconfig" if you need custom driver support.
KERNEL_TYPE="dist"

# Only used when KERNEL_TYPE is sources | hardened | rt
# Options: defconfig | genkernel | manual
KERNEL_CONFIG="defconfig"


# =============================================================================
# DISPLAY SERVER
# =============================================================================
# "both" gives native Wayland + XWayland for any legacy X11 apps.
# Options: wayland | x11 | both
DISPLAY_SERVER="both"


# =============================================================================
# DESKTOP ENVIRONMENT / WINDOW MANAGER
# =============================================================================
# Options: none | gnome | kde | cosmic | sway | niri | hyprland |
#          river | labwc | xfce | lxqt | openbox | i3 | dwm | custom
DESKTOP_ENV="niri"


# =============================================================================
# DISPLAY MANAGER / LOGIN DAEMON
# =============================================================================
# Set to "none" to skip — session will auto-start from TTY1 via .bash_profile.
# gdm    → recommended for GNOME
# sddm   → recommended for KDE, LXQt
# lightdm → lightweight, works with XFCE, openbox, i3
# greetd  → minimal, Wayland-native (pairs well with niri/sway/hyprland)
# ly      → TUI login, no Xorg dependency
# Options: none | gdm | sddm | lightdm | greetd | ly
DISPLAY_MANAGER="sddm"


# =============================================================================
# PORTAGE USE FLAGS
# =============================================================================
# - X kept for XWayland compatibility
# - pipewire replaces pulseaudio; pulseaudio flag removed to avoid conflict
# - nvidia flag added for NVIDIA Wayland/GBM support in Mesa
# Full reference: https://wiki.gentoo.org/wiki/USE_flag
USE_FLAGS="wayland X -gnome -kde -plasma -systemd udev dbus policykit pipewire nvidia"


# =============================================================================
# OPTIONAL FEATURES
# =============================================================================

ENABLE_PIPEWIRE="yes"
ENABLE_BLUETOOTH="no"
ENABLE_PRINTING="no"
ENABLE_FLATPAK="yes"
ENABLE_LIBVIRT="no"
ENABLE_DOCKER="no"
ENABLE_SECURE_BOOT="no"

# Only relevant when ENABLE_SECURE_BOOT="yes"
# Enrolls Microsoft's UEFI CA — only needed for dual-boot or MS-signed hardware
# Options: yes | no
SECURE_BOOT_MICROSOFT_KEYS="no"


# =============================================================================
# EXTRA PACKAGES
# =============================================================================
# Space-separated Portage atoms to emerge after the main install.
# Examples: www-client/firefox media-video/mpv app-editors/vim
EXTRA_PACKAGES=""


# =============================================================================
# PORTAGE MIRRORS
# =============================================================================
# UK mirror for faster downloads from London timezone
# Find more at: https://www.gentoo.org/downloads/mirrors/
GENTOO_MIRRORS="https://mirror.bytemark.co.uk/gentoo"

# Stage3 variant — kept in sync with INIT_SYSTEM
# Options: openrc | systemd | hardened | musl
STAGE3_VARIANT="openrc"