# ─────────────────────────────────────────────────────────────
# Foot terminal config (Wayland-native, fast, minimal)
# ─────────────────────────────────────────────────────────────

[main]

# Font (make sure this exists in your system)
font=FiraCode Nerd Font:size=11
# fallback example:
# font=monospace:size=11

# Terminal type
term=xterm-256color

# DPI scaling (auto)
dpi-aware=yes

# Initial window size
initial-window-size-pixels=1000x600

# Cursor style
cursor-style=beam
cursor-blink=yes

# ─────────────────────────────────────────────────────────────
# Visuals
# ─────────────────────────────────────────────────────────────

[colors]

background=1e1e2e
foreground=cdd6f4

# Normal colors
regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

# Bright colors
bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8

# ─────────────────────────────────────────────────────────────
# Scrollback
# ─────────────────────────────────────────────────────────────

[scrollback]
lines=10000

# ─────────────────────────────────────────────────────────────
# Mouse / selection
# ─────────────────────────────────────────────────────────────

[mouse]
hide-when-typing=yes

# ─────────────────────────────────────────────────────────────
# Performance tweaks
# ─────────────────────────────────────────────────────────────

[main]
pad=10x10

# Reduce latency a bit
resize-delay-ms=16
